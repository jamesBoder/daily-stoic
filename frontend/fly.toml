# fly.toml app configuration file generated for dailystoic-frontend on 2026-03-08T23:27:25-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dailystoic-frontend'
primary_region = 'ord'

[build]
  [build.args]
    VITE_API_URL = "https://dailystoic-backend.fly.dev"


[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
