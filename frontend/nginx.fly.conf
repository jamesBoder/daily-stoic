events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/x-javascript
        application/xml+rss
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.wordsofpraise.app https://wordsofpraise-backend.fly.dev https://accounts.google.com https://rest.api.bible/v1 https://fonts.googleapis.com https://fonts.gstatic.com; frame-src https://apis.google.com https://accounts.google.com;" always;

        # Cache JS/CSS
        location ~* \.(js|css)$ {
            expires 1M;
            add_header Cache-Control "public, max-age=2592000";
        }

        # Cache fonts
        location ~* \.(woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";
        }

        # Cache images
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # No cache for HTML (SPA entry point)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        # SPA routing — all routes serve index.html
        # NOTE: No /api/ proxy block here. On Fly.io the React app calls the backend
        # directly via https://wordsofpraise-backend.fly.dev (absolute URL set at build time).
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
