name: ci-frontend

on:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for frontend changes
        id: filter
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          if git diff --name-only "$BASE" "$HEAD" | grep -qE '^(frontend/|\.github/workflows/ci-frontend\.yml)'; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

  check:
    name: Typecheck, Test, Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npm run typecheck

      # Lint step — uncomment once ESLint is configured (see docs/cicd-plan.md §8.1)
      # - name: Lint
      #   working-directory: frontend
      #   run: npx eslint src --ext .ts,.tsx --max-warnings 0

      - name: Run tests
        working-directory: frontend
        run: npm run test:ci
        env:
          CI: "true"

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://dailystoic-backend.fly.dev

      # Bundle size check — uncomment once size-limit is configured (see docs/cicd-plan.md §8.3)
      # - name: Check bundle size
      #   working-directory: frontend
      #   run: npx size-limit --json | tee size-output.json && npx size-limit

  # Always-run gate job required by branch protection.
  # Passes when the check job passed or was skipped (no frontend changes).
  # Fails when the check job actually failed.
  ci-frontend-ok:
    name: CI Frontend
    runs-on: ubuntu-latest
    needs: [check]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.check.result }}" == "failure" ]]; then
            exit 1
          fi
