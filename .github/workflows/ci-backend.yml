name: ci-backend

on:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for backend changes
        id: filter
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          if git diff --name-only "$BASE" "$HEAD" | grep -qE '^(backend/|\.github/workflows/ci-backend\.yml)'; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

  test:
    name: Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    # ── Uncomment when backend/test/ smoke tests are added ──────────────────
    # services:
    #   postgres:
    #     image: pgvector/pgvector:pg15   # must use pgvector, not plain postgres
    #     env:
    #       POSTGRES_DB: dailystoic_test
    #       POSTGRES_USER: postgres
    #       POSTGRES_PASSWORD: postgres
    #     ports:
    #       - 5432:5432
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5
    #
    # env:
    #   DB_HOST: localhost
    #   DB_PORT: 5432
    #   DB_USER: postgres
    #   DB_PASSWORD: postgres
    #   DB_NAME: dailystoic_test
    #   DB_SSLMODE: disable
    #   JWT_SECRET: test-jwt-secret-for-ci-only
    # ────────────────────────────────────────────────────────────────────────

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: Run unit tests
        working-directory: backend
        run: go test ./internal/... -coverprofile=coverage.out -covermode=atomic -count=1

      # Uncomment and add smoke tests here when backend/test/ exists:
      # - name: Run smoke tests
      #   working-directory: backend
      #   run: go test ./test/... -run TestSmoke -v -count=1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.out
          fail_ci_if_error: false
          comment: true

  security:
    name: Security Scan
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        working-directory: backend
        run: gosec ./internal/...

  style:
    name: Style
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: Check formatting
        working-directory: backend
        run: test -z "$(go fmt ./internal/...)"

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        working-directory: backend
        run: staticcheck ./internal/...

  # Always-run gate job required by branch protection.
  # Passes when all jobs passed or were skipped (no backend changes).
  # Fails when any job actually failed.
  ci-backend-ok:
    name: CI Backend
    runs-on: ubuntu-latest
    needs: [test, security, style]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}"     == "failure" || \
                "${{ needs.security.result }}" == "failure" || \
                "${{ needs.style.result }}"    == "failure" ]]; then
            exit 1
          fi
