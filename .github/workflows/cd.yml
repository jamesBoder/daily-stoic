name: cd

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest

    permissions:
      contents: read  # minimum needed to checkout the repo; no id-token needed here

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master  # TODO: pin to a specific tag e.g. @v1.5

      - name: Deploy backend
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

      - name: Wait for backend health
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Waiting 30s for backend to start..."
          sleep 30
          flyctl status -a dailystoic-backend

  deploy-frontend:
    name: Deploy Frontend → S3 + CloudFront
    runs-on: ubuntu-latest
    needs: deploy-backend

    permissions:
      id-token: write  # required to request a GitHub OIDC token for AWS
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          # VITE_* vars are baked into the JS bundle at build time by Vite.
          # This must be set here in the deploy job — setting it only in ci-frontend.yml
          # has no effect on the actual deployment build.
          VITE_API_URL: https://dailystoic-backend.fly.dev
        run: npm run build
        # Output directory: frontend/build/ (vite.config.ts: build.outDir = "build")

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          # GitHub sends its OIDC token to AWS STS, which verifies it against the
          # registered provider and returns temporary credentials (~15 min TTL).
          # No AWS access keys are stored anywhere in this pipeline.

      - name: Sync hashed assets to S3 (long-term cache)
        working-directory: frontend
        run: |
          aws s3 sync build/ s3://${{ vars.FRONTEND_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"
        # Vite appends content hashes to JS/CSS filenames (e.g. main-abc123.js).
        # A new deploy generates new filenames for changed files, so immutable
        # caching is safe — changed content always gets a different URL.
        # --exclude "index.html" prevents this pass from touching the entry point.

      - name: Upload index.html with no-cache
        working-directory: frontend
        run: |
          aws s3 cp build/index.html s3://${{ vars.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"
        # index.html references the hashed asset filenames for the current deploy.
        # It must never be cached — if a browser caches a stale index.html, it
        # requests old asset URLs that may no longer exist in S3 after --delete.

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
        # Forces all edge locations to re-fetch index.html from S3 immediately.
        # Hashed assets don't need explicit invalidation — new filenames = new cache entries.
        # "/*" counts as 1 path against the 1000 free invalidation paths/month limit.